<app-auth-shell class="auth-shell--signup">
  <section class="auth-card">
    <div class="auth-card__header">
      <span>Start here</span>
      <h2>Create your ChatApp account</h2>
      <p>Set up your profile so you can start chatting right away.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form auth-form--signup" novalidate>
      <label class="auth-field auth-field--half">
        <span>Full name</span>
        <input type="text" formControlName="fullName" placeholder="Ayesha Khan" autocomplete="name" />
        <small *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('required')">
          Full name is required.
        </small>
        <small *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('minlength')">
          Use at least 3 characters.
        </small>
      </label>

      <label class="auth-field auth-field--half">
        <span>Username</span>
        <input type="text" formControlName="handle" placeholder="ayesha" autocomplete="username" />
        <small *ngIf="form.get('handle')?.touched && form.get('handle')?.hasError('required')">
          Username is required.
        </small>
        <small *ngIf="form.get('handle')?.touched && form.get('handle')?.hasError('minlength')">
          Use at least 3 characters.
        </small>
      </label>

      <label class="auth-field auth-field--full">
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="you@chatapp.com" autocomplete="email" />
        <small *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">Email is required.</small>
        <small *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Enter a valid email address.
        </small>
      </label>

      <label class="auth-field auth-field--full">
        <span>Password</span>
        <div class="auth-field__password-row">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Create a secure password"
            autocomplete="new-password"
          />
          <button type="button" class="auth-field__icon-button" (click)="togglePasswordVisibility()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
        <small *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required.
        </small>
        <small *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
          Password should be at least 8 characters.
        </small>
      </label>

      <label class="auth-field auth-field--full">
        <span>Confirm password</span>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Repeat your password"
          autocomplete="new-password"
        />
        <small *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.hasError('required')">
          Please confirm your password.
        </small>
        <small *ngIf="form.touched && form.hasError('passwordMismatch')">
          The passwords do not match.
        </small>
      </label>

      <label class="auth-check auth-check--full">
        <input type="checkbox" formControlName="acceptTerms" />
        <span>I agree to the ChatApp terms and privacy policy.</span>
      </label>
      <small
        class="auth-form__helper auth-form__helper--full"
        *ngIf="form.get('acceptTerms')?.touched && form.get('acceptTerms')?.hasError('requiredTrue')"
      >
        You must accept the terms to continue.
      </small>

      <button type="submit" class="auth-form__submit auth-form__submit--full" [class.auth-form__submit--loading]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-card__footnote">
      Already have an account?
      <a routerLink="/auth/sign-in">Sign in</a>
    </p>
  </section>
</app-auth-shell>
