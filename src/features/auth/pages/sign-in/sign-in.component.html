<app-auth-shell class="auth-shell--signin">
  <section class="auth-card auth-card--signin">
    <button
      type="button"
      class="auth-card__theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <span aria-hidden="true">{{ isDarkMode() ? 'Light' : 'Dark' }}</span>
    </button>

    <div class="auth-card__header">
      <span>Welcome back</span>
      <h2>Sign in to Hi-Sync</h2>
      <p>Use your Hi-Sync account to continue into the app.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
      @if (submitError(); as errorMessage) {
        <p class="auth-form__error" aria-live="polite">{{ errorMessage }}</p>
      }

      <label class="auth-field">
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="you@hisync.com" autocomplete="email" />
        @if (form.get('email')?.touched && form.get('email')?.hasError('required')) {
          <small>Email is required.</small>
        }
        @if (form.get('email')?.touched && form.get('email')?.hasError('email')) {
          <small>Enter a valid email address.</small>
        }
      </label>

      <label class="auth-field">
        <span>Password</span>
        <div class="auth-field__password-row">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="auth-field__icon-button" (click)="togglePasswordVisibility()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
        @if (form.get('password')?.touched && form.get('password')?.hasError('required')) {
          <small>Password is required.</small>
        }
        @if (form.get('password')?.touched && form.get('password')?.hasError('minlength')) {
          <small>Password should be at least 8 characters.</small>
        }
      </label>

      <div class="auth-form__row">
        <label class="auth-check">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember this device</span>
        </label>

        <a href="mailto:support@hisync.local">Forgot password?</a>
      </div>

      <button type="submit" class="auth-form__submit" [class.auth-form__submit--loading]="isSubmitting()">
        {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-card__footnote">
      New to Hi-Sync?
      <a routerLink="/auth/sign-up">Create one</a>
    </p>
  </section>
</app-auth-shell>
